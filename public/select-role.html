<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Role - OBE Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #6366f1 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 2rem 1rem;
        }
        .role-shell {
            max-width: 920px;
            margin: 0 auto;
        }
        .role-header {
            text-align: center;
            color: white;
            margin-bottom: 2rem;
        }
        .role-header h1 {
            font-weight: 800;
            letter-spacing: -0.02em;
        }
        .role-card {
            background: rgba(255,255,255,0.97);
            border: 2px solid transparent;
            border-radius: 18px;
            padding: 1.25rem 1.25rem 1.25rem 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            height: 100%;
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
        }
        .role-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 40px rgba(0,0,0,0.18);
        }
        .role-card.selected {
            border-color: #2563eb;
            background: #eff6ff;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.15);
        }
        .role-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.25rem;
            flex-shrink: 0;
        }
        .role-title {
            font-weight: 700;
            margin-bottom: 0.25rem;
            color: #0f172a;
        }
        .role-desc {
            color: #64748b;
            font-size: 0.9rem;
            margin: 0;
            line-height: 1.45;
        }
        .continue-btn {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            border: none;
            padding: 0.85rem 2rem;
            font-weight: 700;
            border-radius: 12px;
        }
        .continue-btn:disabled {
            opacity: 0.55;
        }
        .user-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 999px;
            padding: 0.45rem 1rem;
            color: white;
            font-size: 0.92rem;
        }
    </style>
</head>
<body>
    <div class="role-shell">
        <div class="role-header">
            <div class="user-chip mb-3" id="userChip"><i class="fas fa-user-circle"></i> <span id="userChipText">Loading...</span></div>
            <h1 class="mb-2">How would you like to continue?</h1>
            <p class="mb-0 opacity-75">Your account has more than one role. Pick the workspace you want to open right now. You can switch later from the top menu.</p>
        </div>

        <div class="row g-3 mb-4" id="roleGrid"></div>

        <div class="text-center">
            <button class="btn btn-primary continue-btn" id="continueBtn" disabled>
                <i class="fas fa-arrow-right me-2"></i>Continue to Dashboard
            </button>
            <div class="mt-3">
                <a href="#" class="text-white-50" id="logoutLink"><i class="fas fa-sign-out-alt me-1"></i>Use a different account</a>
            </div>
        </div>
    </div>

    <script src="/js/dashboard-common.js"></script>
    <script>
        let selectedRole = null;

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            const user = AuthManager.getUser();
            if (!token || !user) {
                window.location.href = '/login.html';
                return;
            }

            const roles = AuthManager.getAvailableRoles();
            if (roles.length <= 1) {
                window.location.href = getDashboardForRole(AuthManager.getActiveRole());
                return;
            }

            document.getElementById('userChipText').textContent = `${user.name || user.email} · ${roles.length} roles`;
            document.getElementById('logoutLink').addEventListener('click', (e) => {
                e.preventDefault();
                AuthManager.logout();
            });

            const lastKey = `lastActiveRole_${user.email}`;
            const lastRole = localStorage.getItem(lastKey);
            if (lastRole && roles.includes(lastRole)) selectedRole = lastRole;

            const grid = document.getElementById('roleGrid');
            roles.forEach(role => {
                const meta = RoleManager.getMeta(role);
                const col = document.createElement('div');
                col.className = 'col-md-6';
                col.innerHTML = `
                    <div class="role-card ${selectedRole === role ? 'selected' : ''}" data-role="${role}">
                        <div class="role-icon" style="background:${meta.color}">
                            <i class="fas ${meta.icon}"></i>
                        </div>
                        <div>
                            <div class="role-title">${meta.label}</div>
                            <p class="role-desc">${meta.description}</p>
                        </div>
                    </div>`;
                col.querySelector('.role-card').addEventListener('click', () => selectRole(role));
                grid.appendChild(col);
            });

            document.getElementById('continueBtn').disabled = !selectedRole;
            document.getElementById('continueBtn').addEventListener('click', async () => {
                if (!selectedRole) return;
                const btn = document.getElementById('continueBtn');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Opening dashboard...';
                try {
                    await RoleManager.switchRole(selectedRole, { redirect: true });
                } catch (err) {
                    alert(err.message || 'Could not switch role');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-arrow-right me-2"></i>Continue to Dashboard';
                }
            });
        });

        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-card').forEach(card => {
                card.classList.toggle('selected', card.dataset.role === role);
            });
            document.getElementById('continueBtn').disabled = false;
        }
    </script>
</body>
</html>
