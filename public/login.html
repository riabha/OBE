<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QUEST University Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .quest-logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
            display: block;
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
        .btn-login {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            border: none;
            border-radius: 10px;
            padding: 12px 20px;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
            width: 100%;
            font-size: 1.1rem;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(30, 58, 138, 0.4);
            color: white;
        }
        .form-control {
            border-radius: 10px;
            border: 2px solid #e9ecef;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
        }
        .credentials-info {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 15px;
            padding: 1.5rem;
            margin-top: 2rem;
            border: 1px solid #dee2e6;
        }
        .alert {
            border-radius: 10px;
            border: none;
        }
        .quick-login-btn {
            font-size: 0.85rem;
            padding: 6px 12px;
            margin: 2px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .quick-login-btn:hover {
            transform: translateY(-1px);
        }
        .role-badge {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 6px;
            margin-left: 8px;
        }
        .student-badge { background: #e3f2fd; color: #1976d2; }
        .teacher-badge { background: #f3e5f5; color: #7b1fa2; }
        .focal-badge { background: #e8f5e8; color: #388e3c; }
        .chairman-badge { background: #fff3e0; color: #f57c00; }
        .dean-badge { background: #fce4ec; color: #c2185b; }
        .controller-badge { background: #e0f2f1; color: #00695c; }
        .admin-badge { background: #ffebee; color: #d32f2f; }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- QUEST Logo -->
        <img src="quest_logo.png" alt="QUEST Logo" class="quest-logo">
        
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark">QUEST University</h2>
            <p class="text-muted mb-0">Management System</p>
            <hr class="my-3">
            <p class="text-muted">Sign in to access your account</p>
        </div>

        <!-- Alert for messages -->
        <div id="alertContainer"></div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">
                    <i class="fas fa-envelope me-2"></i>Email Address
                </label>
                <input type="email" class="form-control" id="email" name="email" required 
                       placeholder="Enter your email address">
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">
                    <i class="fas fa-lock me-2"></i>Password
                </label>
                <input type="password" class="form-control" id="password" name="password" required 
                       placeholder="Enter your password">
            </div>
            
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="rememberMe">
                <label class="form-check-label" for="rememberMe">
                    Remember me
                </label>
            </div>
            
            <button type="submit" class="btn btn-login">
                <i class="fas fa-sign-in-alt me-2"></i>Sign In
            </button>
        </form>

        <!-- Quick Login Section -->
        <div class="credentials-info">
            <h6 class="fw-bold mb-3">
                <i class="fas fa-key me-2"></i>Quick Access
            </h6>
            
            <div class="row">
                <div class="col-12 mb-3">
                    <div class="d-flex flex-wrap gap-2">
                        <button class="btn btn-sm btn-outline-primary quick-login-btn" onclick="quickLogin('student@quest.edu.pk')">
                            Student<span class="role-badge student-badge">Student</span>
                        </button>
                        <button class="btn btn-sm btn-outline-primary quick-login-btn" onclick="quickLogin('teacher@quest.edu.pk')">
                            Teacher<span class="role-badge teacher-badge">Teacher</span>
                        </button>
                        <button class="btn btn-sm btn-outline-primary quick-login-btn" onclick="quickLogin('focal@quest.edu.pk')">
                            Focal<span class="role-badge focal-badge">Focal</span>
                        </button>
                        <button class="btn btn-sm btn-outline-primary quick-login-btn" onclick="quickLogin('chairman@quest.edu.pk')">
                            Chairman<span class="role-badge chairman-badge">Chairman</span>
                        </button>
                        <button class="btn btn-sm btn-outline-primary quick-login-btn" onclick="quickLogin('dean@quest.edu.pk')">
                            Dean<span class="role-badge dean-badge">Dean</span>
                        </button>
                        <button class="btn btn-sm btn-outline-primary quick-login-btn" onclick="quickLogin('controller@quest.edu.pk')">
                            Controller<span class="role-badge controller-badge">Controller</span>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="text-center">
                <small class="text-muted">
                    <i class="fas fa-info-circle me-1"></i>
                    All test accounts use password: <strong>pass</strong>
                </small>
            </div>
        </div>

        <div class="text-center mt-4">
            <small class="text-muted">
                <i class="fas fa-shield-alt me-1"></i>
                Secure Login Portal
            </small>
        </div>
    </div>

    <script>

        // Authentication functions
        window.auth = {
            authenticateUser: function(email, password) {
                const user = users.find(u => u.email === email && u.password === password);
                if (user) {
                    // Remove password from returned user object
                    const { password, ...userWithoutPassword } = user;
                    return userWithoutPassword;
                }
                return null;
            },
            
            generateToken: function(user) {
                // Simple token generation (in production, use JWT)
                return btoa(JSON.stringify({
                    id: user.id,
                    email: user.email,
                    role: user.role,
                    timestamp: Date.now()
                }));
            }
        };
    </script>
    <script>
        // Show alert function
        function showAlert(message, type = 'danger') {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-triangle'} me-2"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        // Quick login function
        async function quickLogin(email) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = 'pass';
            // Auto-submit the form
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showAlert('Please fill in all fields');
                return;
            }

            try {
                // Show loading state
                const submitBtn = document.querySelector('.btn-login');
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Signing In...';
                submitBtn.disabled = true;

                // Call the API for authentication
                const response = await fetch('/.netlify/functions/auth-login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.user) {
                    showAlert('Login successful! Redirecting...', 'success');
                    
                    // Store user data and token in localStorage
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Redirect to appropriate dashboard after 1 second
                    setTimeout(() => {
                        const dashboardMap = {
                            'superadmin': '/super-admin-dashboard.html',
                            'student': '/student-dashboard-enhanced.html',
                            'teacher': '/teacher-dashboard-enhanced.html',
                            'focal': '/focal-dashboard-enhanced.html',
                            'chairman': '/chairman-dashboard-enhanced.html',
                            'dean': '/dean-dashboard-enhanced.html',
                            'controller': '/controller-dashboard-enhanced.html'
                        };
                        
                        const dashboardFile = dashboardMap[data.user.role] || '/student-dashboard-enhanced.html';
                        window.location.href = dashboardFile;
                    }, 1000);
                } else {
                    showAlert(data.message || 'Invalid email or password. Please check your credentials.');
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Network error. Please check your connection and try again.');
            } finally {
                // Reset button state
                const submitBtn = document.querySelector('.btn-login');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
