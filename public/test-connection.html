<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Test - QUEST OBE Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .test-container {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .test-result {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 1rem;
            margin: 1rem 0;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .status-success {
            border-left: 4px solid #28a745;
        }
        .status-error {
            border-left: 4px solid #dc3545;
        }
        .status-pending {
            border-left: 4px solid #ffc107;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1 class="text-center mb-4">
            <i class="fas fa-network-wired me-2"></i>
            QUEST OBE Portal - Connection Test
        </h1>
        
        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title">Test API Connection</h5>
                <button class="btn btn-primary" onclick="testAPI()">
                    <i class="fas fa-plug me-2"></i>Test API
                </button>
                <div id="apiResult" class="test-result mt-3" style="display: none;"></div>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title">Test Database Connection</h5>
                <button class="btn btn-success" onclick="testDatabase()">
                    <i class="fas fa-database me-2"></i>Test Database
                </button>
                <div id="dbResult" class="test-result mt-3" style="display: none;"></div>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title">Test Login (Demo Account)</h5>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="testEmail" value="student@quest.edu.pk">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="testPassword" value="pass">
                </div>
                <button class="btn btn-warning" onclick="testLogin()">
                    <i class="fas fa-sign-in-alt me-2"></i>Test Login
                </button>
                <div id="loginResult" class="test-result mt-3" style="display: none;"></div>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title">Run All Tests</h5>
                <button class="btn btn-info text-white" onclick="runAllTests()">
                    <i class="fas fa-tasks me-2"></i>Run All Tests
                </button>
            </div>
        </div>
    </div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('apiResult');
            resultDiv.style.display = 'block';
            resultDiv.className = 'test-result status-pending';
            resultDiv.textContent = 'Testing API connection...';

            try {
                const response = await fetch('/api/test');
                const data = await response.json();
                
                resultDiv.className = 'test-result status-success';
                resultDiv.textContent = `✓ API Connection Successful!\n\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultDiv.className = 'test-result status-error';
                resultDiv.textContent = `✗ API Connection Failed!\n\nError: ${error.message}`;
            }
        }

        async function testDatabase() {
            const resultDiv = document.getElementById('dbResult');
            resultDiv.style.display = 'block';
            resultDiv.className = 'test-result status-pending';
            resultDiv.textContent = 'Testing database connection...';

            try {
                const response = await fetch('/api/db-test');
                const data = await response.json();
                
                if (data.status === 'success') {
                    resultDiv.className = 'test-result status-success';
                    resultDiv.textContent = `✓ Database Connection Successful!\n\n${JSON.stringify(data, null, 2)}`;
                } else {
                    resultDiv.className = 'test-result status-error';
                    resultDiv.textContent = `✗ Database Connection Failed!\n\n${JSON.stringify(data, null, 2)}\n\nNote: Login will use fallback authentication.`;
                }
            } catch (error) {
                resultDiv.className = 'test-result status-error';
                resultDiv.textContent = `✗ Database Test Failed!\n\nError: ${error.message}\n\nNote: Login will use fallback authentication.`;
            }
        }

        async function testLogin() {
            const resultDiv = document.getElementById('loginResult');
            const email = document.getElementById('testEmail').value;
            const password = document.getElementById('testPassword').value;

            resultDiv.style.display = 'block';
            resultDiv.className = 'test-result status-pending';
            resultDiv.textContent = 'Testing login...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                
                if (response.ok && data.user) {
                    resultDiv.className = 'test-result status-success';
                    resultDiv.textContent = `✓ Login Successful!\n\n${JSON.stringify(data, null, 2)}`;
                } else {
                    resultDiv.className = 'test-result status-error';
                    resultDiv.textContent = `✗ Login Failed!\n\n${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                resultDiv.className = 'test-result status-error';
                resultDiv.textContent = `✗ Login Test Failed!\n\nError: ${error.message}`;
            }
        }

        async function runAllTests() {
            await testAPI();
            await new Promise(resolve => setTimeout(resolve, 1000));
            await testDatabase();
            await new Promise(resolve => setTimeout(resolve, 1000));
            await testLogin();
        }

        // Auto-run tests on page load
        window.addEventListener('load', function() {
            console.log('Page loaded. You can run tests manually or click "Run All Tests"');
        });
    </script>
</body>
</html>
