# Netlify Configuration for QUEST OBE Portal

[build]
  publish = "public"
  command = "echo 'No build step required'"

# Functions configuration
[functions]
  directory = "netlify/functions"

# Redirect rules for API functions
[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth-login"
  status = 200

# Redirect rules for SPA - serve index.html for all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Specific redirects for dashboard files
[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/student-dashboard"
  to = "/student-dashboard-enhanced.html"
  status = 200

[[redirects]]
  from = "/teacher-dashboard"
  to = "/teacher-dashboard-enhanced.html"
  status = 200

[[redirects]]
  from = "/focal-dashboard"
  to = "/focal-dashboard-enhanced.html"
  status = 200

[[redirects]]
  from = "/chairman-dashboard"
  to = "/chairman-dashboard-enhanced.html"
  status = 200

[[redirects]]
  from = "/dean-dashboard"
  to = "/dean-dashboard-enhanced.html"
  status = 200

[[redirects]]
  from = "/controller-dashboard"
  to = "/controller-dashboard-enhanced.html"
  status = 200

[[redirects]]
  from = "/super-admin-dashboard"
  to = "/super-admin-dashboard.html"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

