# Netlify Configuration for QUEST OBE Portal

# Build settings
[build]
  publish = "public"
  command = "npm run build"

# Redirect rules for SPA
[[redirects]]
  from = "/api/*"
  to = "/api/index.js"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

